<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <h1>Spin The Wheel And Win</h1>
        <div class="container">
            <div class="a1"></div>
            <div class="a2"></div>
            <div class="a3"></div>
            <div class="a4"></div>
            <div class="a5"></div>
            <p id="p1">😫</p>
            <p id="p2">₹7</p>
            <p id="p3">₹1</p>
            <p id="p4">😣</p>
            <p id="p5">₹11</p>
            <p id="p6">🙁</p>
        </div>
        <div class="arrow">↑</div>
        <div class="bottom">
            <button id="spin">Spin</button>
            <button disabled id="reset">Reset</button>
        </div>
        <p id="result"></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
